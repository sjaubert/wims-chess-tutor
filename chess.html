<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess vs. Bot</title>
    <style>
        :root {
            --bg1: #f5eee4;
            --bg2: #ead8c2;
            --ink: #26201c;
            --muted: #786b60;
            --light: #f0dec7;
            --dark: #b6784f;
            --accent: #536b46;
            --sq: min(10.6vw, calc((100dvh - 136px)/8), 82px);
            --board: calc(var(--sq)*8);
            --shadow: 0 24px 80px rgba(71, 43, 20, .18);
        }
        * { box-sizing: border-box }
        body {
            margin: 0;
            height: 100dvh;
            overflow: hidden;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
            color: var(--ink);
            background: radial-gradient(circle at 22% 8%, rgba(255,255,255,.88), transparent 29%),
                linear-gradient(135deg, var(--bg2), #faf6ef 48%, var(--bg1));
        }
        .app {
            display: grid;
            grid-template-columns: max-content 390px;
            gap: 24px;
            align-items: start;
            justify-content: center;
            width: min(100%, 1220px);
            max-height: calc(100dvh - 48px);
        }
        .right-stack {
            height: calc(var(--board) + 90px);
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 14px;
            align-self: start;
        }
        .board-card, .side, .score-pane {
            background: rgba(255,250,242,.88);
            border: 1px solid rgba(93,61,33,.15);
            box-shadow: var(--shadow);
            border-radius: 30px;
            backdrop-filter: blur(14px);
        }
        .board-card {
            padding: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: max-content;
        }
        .side {
            padding: 20px;
            min-height: 0;
            display: grid;
            grid-template-rows: auto minmax(0,1fr) auto 118px;
            overflow: hidden;
        }
        .score-pane { padding: 16px 18px }
        .top {
            width: var(--board);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            margin: 0 0 14px;
        }
        .title h1 {
            margin: 0;
            font-size: 40px;
            line-height: .95;
            letter-spacing: -.045em;
        }
        .top-status {
            font-weight: 950;
            color: var(--accent);
            background: transparent;
            border: 0;
            border-radius: 999px;
            padding: 10px 15px;
            min-width: 121px;
            text-align: center;
            white-space: nowrap;
            box-shadow: none;
            font-size: 15px;
        }
        #board {
            width: var(--board);
            height: var(--board);
            display: grid;
            grid-template-columns: repeat(8, var(--sq));
            grid-template-rows: repeat(8, var(--sq));
            overflow: hidden;
            border-radius: 19px;
            position: relative;
            touch-action: none;
            box-shadow: inset 0 0 0 1px rgba(57,34,17,.24);
            margin: 0 auto;
        }
        .square {
            width: var(--sq);
            height: var(--sq);
            display: grid;
            place-items: center;
            position: relative;
        }
        .light { background: #f0d9b5 }
        .dark  { background: #b58863 }
        .square.coord:after {
            content: attr(data-coord);
            position: absolute;
            left: 7px;
            bottom: 5px;
            font-size: 10px;
            font-weight: 900;
            opacity: .36;
            color: #291b13;
        }
        .square.last  { box-shadow: inset 0 0 0 999px rgba(216,154,56,.30) }
        .square.from  { box-shadow: inset 0 0 0 999px rgba(255,244,120,.36) }
        .square.check { box-shadow: inset 0 0 0 999px rgba(210,40,40,.30) }
        .square.target:before {
            content: "";
            position: absolute;
            width: 30%;
            height: 30%;
            border-radius: 50%;
            background: rgba(49,75,40,.38);
            z-index: 1;
        }
        .square.capture:before {
            content: "";
            position: absolute;
            inset: 6px;
            border: 5px solid rgba(49,75,40,.38);
            border-radius: 50%;
            z-index: 1;
        }
        #moveArrow {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 4;
            overflow: visible;
        }
        .move-arrow-line {
            stroke: rgba(83,107,70,.92);
            stroke-width: .065;
            stroke-linecap: round;
            filter: drop-shadow(0 .035px .045px rgba(0,0,0,.28));
        }
        .piece {
            width: calc(var(--sq)*.92);
            height: calc(var(--sq)*.92);
            display: grid;
            place-items: center;
            z-index: 2;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            transition: transform .1s ease;
        }
        .piece:hover { transform: translateY(-3px) scale(1.06) }
        .piece.dragging {
            position: fixed;
            z-index: 99999;
            pointer-events: none;
            transform: translate(-50%,-50%) scale(1.14);
            transition: none;
            cursor: grabbing;
        }
        .piece svg {
            width: 100%;
            height: 100%;
            display: block;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,.28));
        }
        .controls {
            display: grid;
            gap: 0;
            margin: 16px 0 0;
        }
        button {
            border: 0;
            border-radius: 16px;
            padding: 13px 14px;
            font-weight: 900;
            font: inherit;
            cursor: pointer;
            background: var(--ink);
            color: white;
            box-shadow: 0 10px 22px rgba(45,37,32,.14);
        }
        button.secondary {
            background: white;
            color: var(--ink);
            border: 1px solid rgba(93,61,33,.15);
        }
        button.danger {
            background: white;
            color: #b03030;
            border: 1px solid rgba(176,48,48,.30);
        }
        button.danger:hover { background: rgba(176,48,48,.07); }
        .label {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 950;
            letter-spacing: .08em;
            color: var(--muted);
        }
        .section-title { padding: 4px 0 9px }
        .pieces-title  { padding-top: 14px }
        .moves {
            min-height: 0;
            height: 100%;
            overflow: auto;
            background: white;
            border: 1px solid rgba(93,61,33,.12);
            border-radius: 18px;
            padding: 10px 11px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 10.8px;
            line-height: 1.42;
        }
        .moves span { display: block }
        .move-entry {
            padding: 0 0 7px;
            margin: 0 0 7px;
            border-bottom: 1px solid rgba(93,61,33,.08);
        }
        .move-entry:last-child { border-bottom: 0 }
        .move-main { white-space: nowrap }
        .move-sub { white-space: nowrap; color: var(--muted) }
        .score-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }
        .score-title {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 950;
            letter-spacing: .08em;
            color: var(--muted);
        }
        .scoreline {
            font-size: 28px;
            font-weight: 950;
            letter-spacing: -.04em;
            margin-top: 3px;
        }
        .reset-link {
            border: 0;
            background: none;
            color: var(--muted);
            font-size: 12px;
            text-decoration: underline;
            cursor: pointer;
            padding: 0;
            box-shadow: none;
            font-weight: 750;
        }
        .captures-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 0;
            height: 118px;
            background: var(--light);
            border: 1px solid rgba(93,61,33,.16);
            border-radius: 18px;
            padding: 12px 14px;
            align-items: start;
            overflow: hidden;
        }
        .capture-box {
            min-height: 0;
            display: flex;
            align-items: flex-start;
            overflow: hidden;
        }
        .capture-row {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            row-gap: 6px;
            align-items: center;
            overflow: hidden;
        }
        .cap-item {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            font-weight: 950;
            line-height: 1;
            min-height: 20px;
        }
        .cap-piece { width: 28px; height: 28px; display: inline-grid; place-items: center; flex: 0 0 auto }
        .cap-piece svg { width: 28px; height: 28px; display: block }
        .cap-count {
            font-size: 12px;
            color: var(--muted);
            font-weight: 950;
            line-height: 1;
            display: inline-block;
            transform: translateY(.5px);
            margin-left: -1px;
        }

        /* === PROMOTION DIALOG === */
        .promo-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.55);
            display: grid;
            place-items: center;
            z-index: 9999;
            backdrop-filter: blur(4px);
        }
        .promo-overlay.hidden { display: none }
        .promo-dialog {
            background: rgba(255,250,242,.97);
            border-radius: 24px;
            padding: 24px 28px;
            box-shadow: 0 32px 80px rgba(0,0,0,.28);
            text-align: center;
        }
        .promo-title {
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: .09em;
            color: var(--muted);
            margin-bottom: 16px;
        }
        .promo-choices {
            display: flex;
            gap: 12px;
        }
        .promo-choices button {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            background: white;
            border: 2px solid rgba(93,61,33,.18);
            padding: 6px;
            box-shadow: 0 4px 12px rgba(0,0,0,.10);
            display: grid;
            place-items: center;
        }
        .promo-choices button:hover {
            border-color: var(--accent);
            background: #f0f7ec;
            transform: translateY(-2px);
        }
        .promo-choices button svg { width: 52px; height: 52px }

        .book-status {
            margin-top: 10px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .04em;
            color: var(--muted);
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 10px;
            background: rgba(93,61,33,.07);
            border: 1px dashed rgba(93,61,33,.22);
            text-align: center;
            transition: background .15s;
        }
        .book-status:hover { background: rgba(93,61,33,.14); }
        .book-status.error {
            color: #b03030;
            background: rgba(176,48,48,.08);
            border: 1px solid rgba(176,48,48,.30);
            border-style: solid;
        }
        .book-status.loaded {
            color: var(--accent);
            background: rgba(83,107,70,.10);
            border: 1px solid rgba(83,107,70,.30);
            border-style: solid;
        }

        @media(max-width:880px) {
            body { height: auto; min-height: 100dvh; overflow: auto }
            .app { grid-template-columns: 1fr; place-items: center; max-height: none }
            .right-stack { width: min(100%, calc(var(--board) + 28px)); height: auto }
            .side {
                padding: 20px;
                min-height: 420px;
                display: grid;
                grid-template-rows: auto minmax(0,1fr) auto 118px;
                overflow: hidden;
            }
            .title h1 { font-size: 34px }
            :root { --sq: min(11.35vw, calc((100dvh - 124px)/8), 72px) }
            .board-card { padding: 14px; width: max-content; max-width: 100% }
        }
.wims-home{display:inline-block;margin-bottom:6px;font-size:12px;color:var(--accent);text-decoration:none}
.wims-home:hover{text-decoration:underline}
.tutor-switch{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:14px;cursor:pointer}
.tutor-pane{background:rgba(255,250,242,.88);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px}
.tutor-pane.hidden{display:none}
.tutor-head{display:flex;justify-content:space-between;align-items:center}
.tutor-title{font-weight:600}
.tutor-book{font-size:13px;color:var(--muted)}
.tutor-book.theory{color:var(--accent);font-weight:600}
.tutor-evalrow{display:flex;align-items:center;gap:12px}
.evalbar{position:relative;width:14px;height:90px;background:#2a2a2a;border-radius:7px;overflow:hidden}
.evalbar-fill{position:absolute;left:0;bottom:0;width:100%;background:#f5f1ea;transition:height .3s}
.tutor-eval{font-size:22px;font-weight:700}
.tutor-words{font-size:13px;color:var(--muted)}
.tutor-linelabel{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.tutor-line{font-size:14px;line-height:1.5}
.tutor-ask{padding:8px 12px;border-radius:10px;cursor:pointer}
.tutor-ask:disabled{opacity:.45;cursor:not-allowed}
.tutor-llm{font-size:14px;line-height:1.55;white-space:pre-wrap}
.tutor-llm.error{color:#b3402e}
.tutor-settings{display:flex;flex-direction:column;gap:8px;border-top:1px solid rgba(120,107,96,.25);padding-top:10px}
.tutor-settings.hidden{display:none}
.tutor-settings label{display:flex;flex-direction:column;gap:4px;font-size:13px}
.tutor-settings input,.tutor-settings select{padding:6px 8px;border-radius:8px;border:1px solid rgba(120,107,96,.4)}
.tutor-warn{font-size:11px;color:#9a7b2e}
.tutor-testresult{font-size:12px}
.right-stack{display:flex;flex-direction:column}
.right-stack .side{flex:1 1 auto}
.right-stack.train .score-pane,.right-stack.train .side,.right-stack.train #tutorPane{display:none}
.right-stack:not(.train) #trainPane{display:none}
.mode-switch{display:flex;gap:8px}
.mode-btn{flex:1;padding:8px 10px;border-radius:10px;border:1px solid rgba(120,107,96,.4);background:rgba(255,250,242,.7);cursor:pointer;font-size:13px}
.mode-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.train-pane{background:rgba(255,250,242,.88);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px;overflow:auto}
.train-title{font-weight:600}
#openingSearch{padding:8px 10px;border-radius:10px;border:1px solid rgba(120,107,96,.4)}
.opening-results{display:flex;flex-direction:column;gap:4px;overflow:auto;max-height:calc(var(--board) - 60px)}
.opening-row{text-align:left;padding:8px 10px;border-radius:8px;border:1px solid rgba(120,107,96,.25);background:#fff;cursor:pointer;font-size:13px}
.opening-row:hover{border-color:var(--accent)}
.opening-row .eco{color:var(--muted);font-size:11px;margin-right:6px}
.opening-row .moves{color:var(--muted);font-size:11px}
.opening-sidechoice{display:flex;gap:8px;margin-top:4px}
.drill-eco{color:var(--muted);font-weight:400;font-size:13px}
.drill-progress{font-size:13px;color:var(--muted)}
.drill-feedback{font-size:14px;min-height:1.4em}
.drill-feedback.good{color:var(--accent)}
.drill-feedback.bad{color:#b3402e}
.drill-btn{padding:8px 12px;border-radius:10px;border:1px solid rgba(120,107,96,.4);background:rgba(255,250,242,.8);cursor:pointer;font-size:13px}
.drill-btn:disabled{opacity:.45;cursor:not-allowed}
.drill-actions{display:flex;flex-wrap:wrap;gap:8px}
.drill-explain{font-size:14px;line-height:1.55;white-space:pre-wrap}
.drill-explain.error{color:#b3402e}
.hint-from{box-shadow:inset 0 0 0 4px rgba(83,107,70,.9)}
.hint-to{box-shadow:inset 0 0 0 4px rgba(83,107,70,.55)}
.square.hint-from, .square.hint-to{position:relative}
    </style>
</head>
<body>
<div class="app">
    <section class="board-card">
        <div class="top">
            <div class="title"><h1>Chess</h1></div>
            <div id="status" class="top-status">Your move</div>
        </div>
        <div id="board"></div>
    </section>
    <div class="right-stack">
        <div class="mode-switch">
            <button id="modePlay" class="mode-btn active">Partie libre</button>
            <button id="modeTrain" class="mode-btn">Entraînement ouvertures</button>
        </div>
        <section class="score-pane">
            <div class="score-head">
                <div>
                    <a id="wimsHome" class="wims-home" href="/wims/wims.cgi">← Retour à WIMS</a>
                    <div class="score-title">Scoreboard</div>
                    <div id="scoreboard" class="scoreline">0 - 0 - 0</div>
                </div>
                <button id="resetScores" class="reset-link">reset</button>
            </div>
            <label class="tutor-switch">
                <input type="checkbox" id="tutorToggle">
                <span>🎓 Tuteur IA</span>
            </label>
            <div class="controls" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
              <button id="newGame">New Game</button>
              <button id="resign" class="danger">Abandonner</button>
            </div>
            <div id="bookStatus" class="book-status" title="Cliquer pour charger un livre d'ouverture .bin (Polyglot)">Pas de livre — charger .bin</div>
            <input type="file" id="bookFileInput" accept=".bin" style="display:none">
        </section>
        <aside class="side">
            <div class="label section-title">Past moves</div>
            <div id="moves" class="moves"></div>
            <div class="label section-title pieces-title">Pieces removed</div>
            <div class="captures-grid">
                <div class="capture-box"><div id="userCaps" class="capture-row"></div></div>
                <div class="capture-box"><div id="botCaps"  class="capture-row"></div></div>
            </div>
        </aside>
        <section id="tutorPane" class="tutor-pane hidden">
            <div class="tutor-head">
                <div class="tutor-title">Tuteur</div>
                <button id="tutorSettingsBtn" class="reset-link" title="Réglages IA">⚙︎</button>
            </div>
            <div id="tutorBook" class="tutor-book"></div>
            <div class="tutor-evalrow">
                <div class="evalbar"><div id="tutorEvalFill" class="evalbar-fill"></div></div>
                <div>
                    <div id="tutorEval" class="tutor-eval"></div>
                    <div id="tutorWords" class="tutor-words"></div>
                </div>
            </div>
            <div class="tutor-linelabel">Meilleure ligne</div>
            <div id="tutorLine" class="tutor-line"></div>
            <button id="tutorAskBtn" class="tutor-ask" disabled>✨ Avis de l'IA</button>
            <div id="tutorLLM" class="tutor-llm"></div>
            <div id="tutorSettings" class="tutor-settings hidden">
                <label>Clé API Claude
                    <input type="password" id="tutorKeyInput" placeholder="sk-ant-...">
                </label>
                <label>Modèle
                    <select id="tutorModelInput">
                        <option value="claude-haiku-4-5-20251001">Haiku (économique)</option>
                        <option value="claude-sonnet-4-6">Sonnet (qualité)</option>
                    </select>
                </label>
                <button id="tutorSaveBtn">Enregistrer</button>
                <button id="tutorTestBtn">Tester la connexion</button>
                <div id="tutorTestResult" class="tutor-testresult"></div>
                <div class="tutor-warn">La clé est stockée uniquement dans ce navigateur. À éviter sur un poste partagé.</div>
            </div>
        </section>
        <section id="trainPane" class="train-pane">
            <div id="openingPicker" class="opening-picker">
                <div class="train-title">Choisir une ouverture</div>
                <input id="openingSearch" type="search" placeholder="Rechercher une ouverture…">
                <div id="openingResults" class="opening-results"></div>
            </div>
            <div id="drillPanel" class="drill-panel hidden">
                <div class="train-title"><span id="drillName"></span> <span id="drillEco" class="drill-eco"></span></div>
                <div id="drillProgress" class="drill-progress"></div>
                <div id="drillFeedback" class="drill-feedback"></div>
                <button id="drillHintBtn" class="drill-btn">Indice</button>
                <button id="drillExplainBtn" class="drill-btn" disabled>💡 Explique cette ouverture</button>
                <div id="drillExplain" class="drill-explain"></div>
                <div class="drill-actions">
                    <button id="drillRestart" class="drill-btn">Recommencer</button>
                    <button id="drillChange" class="drill-btn">Changer d'ouverture</button>
                    <button id="drillToFree" class="drill-btn hidden">Continuer en partie libre</button>
                </div>
            </div>
        </section>
    </div>
</div>

<!-- Promotion dialog -->
<div id="promoOverlay" class="promo-overlay hidden">
    <div class="promo-dialog">
        <div class="promo-title">Promotion — choose a piece</div>
        <div id="promoChoices" class="promo-choices"></div>
    </div>
</div>

const rc  = i => [Math.floor(i/8), i%8];
const idx = (r,c) => r*8+c;
const on  = (r,c) => r>=0&&r<8&&c>=0&&c<8;
const opp = c => c===WHITE?BLACK:WHITE;
function sqName(i){ const[r,c]=rc(i); return FILES[c]+(8-r); }

function clone(s){
  return {b:s.b.map(p=>p?{...p}:null),turn:s.turn,cast:s.cast,ep:s.ep,half:s.half,full:s.full};
}

function pseudoMoves(s,color){
  const moves=[],b=s.b;
  const add=(from,to,x={})=>moves.push({from,to,...x});
  for(let i=0;i<64;i++){
    const p=b[i]; if(!p||p.c!==color)continue;
    const[r,c]=rc(i);
    if(p.t==='P'){
      const dir=color===WHITE?-1:1,start=color===WHITE?6:1,prom=color===WHITE?0:7;
      const fr=r+dir;
      if(on(fr,c)&&!b[idx(fr,c)]){
        const to=idx(fr,c);
        if(fr===prom)['Q','R','B','N'].forEach(pr=>add(i,to,{promo:pr}));
        else add(i,to);
        const dr=r+2*dir;
        if(r===start&&!b[idx(dr,c)])add(i,idx(dr,c),{dbl:true});
      }
      for(const dc of[-1,1]){
        const rr=r+dir,cc=c+dc;
        if(!on(rr,cc))continue;
        const to=idx(rr,cc),target=b[to];
        if(target&&target.c!==color){
          if(rr===prom)['Q','R','B','N'].forEach(pr=>add(i,to,{promo:pr}));
          else add(i,to);
        }
        if(s.ep===to)add(i,to,{ep:true});
      }
    } else if(p.t==='N'){
      for(const[dr,dc]of[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]){
        const rr=r+dr,cc=c+dc;
        if(on(rr,cc)&&(!b[idx(rr,cc)]||b[idx(rr,cc)].c!==color))add(i,idx(rr,cc));
      }
    } else if(p.t==='B'||p.t==='R'||p.t==='Q'){
      const dirs=[];
      if(p.t!=='R')dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
      if(p.t!=='B')dirs.push([-1,0],[1,0],[0,-1],[0,1]);
      for(const[dr,dc]of dirs){
        let rr=r+dr,cc=c+dc;
        while(on(rr,cc)){
          const to=idx(rr,cc),q=b[to];
          if(!q)add(i,to); else{if(q.c!==color)add(i,to);break;}
          rr+=dr;cc+=dc;
        }
      }
    } else if(p.t==='K'){
      for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
        if(!dr&&!dc)continue;
        const rr=r+dr,cc=c+dc;
        if(on(rr,cc)&&(!b[idx(rr,cc)]||b[idx(rr,cc)].c!==color))add(i,idx(rr,cc));
      }
      if(!inCheck(s,color)){
        if(color===WHITE&&i===60){
          if(s.cast.includes('K')&&!b[61]&&!b[62]&&!attacked(s,61,BLACK)&&!attacked(s,62,BLACK))add(i,62,{castle:'K'});
          if(s.cast.includes('Q')&&!b[59]&&!b[58]&&!b[57]&&!attacked(s,59,BLACK)&&!attacked(s,58,BLACK))add(i,58,{castle:'Q'});
        }
        if(color===BLACK&&i===4){
          if(s.cast.includes('k')&&!b[5]&&!b[6]&&!attacked(s,5,WHITE)&&!attacked(s,6,WHITE))add(i,6,{castle:'k'});
          if(s.cast.includes('q')&&!b[3]&&!b[2]&&!b[1]&&!attacked(s,3,WHITE)&&!attacked(s,2,WHITE))add(i,2,{castle:'q'});
        }
      }
    }
  }
  return moves;
}

function legalMoves(s,color=s.turn){
  return pseudoMoves(s,color).filter(m=>!inCheck(applyMove(s,m,false),color));
}

function applyMove(s,m,real=false){
  const n=clone(s),b=n.b,p=b[m.from],cap=b[m.to];
  b[m.to]=p;b[m.from]=null;
  if(m.ep){const capSq=m.to+(p.c===WHITE?8:-8);b[capSq]=null;}
  if(m.promo)b[m.to]={c:p.c,t:m.promo};
  if(m.castle==='K'){b[61]=b[63];b[63]=null;}
  if(m.castle==='Q'){b[59]=b[56];b[56]=null;}
  if(m.castle==='k'){b[5]=b[7];b[7]=null;}
  if(m.castle==='q'){b[3]=b[0];b[0]=null;}
  if(p.t==='K')n.cast=n.cast.replace(p.c===WHITE?/K|Q/g:/k|q/g,'');
  if(p.t==='R'){
    if(m.from===63)n.cast=n.cast.replace('K','');
    if(m.from===56)n.cast=n.cast.replace('Q','');
    if(m.from===7)n.cast=n.cast.replace('k','');
    if(m.from===0)n.cast=n.cast.replace('q','');
  }
  if(cap&&cap.t==='R'){
    if(m.to===63)n.cast=n.cast.replace('K','');
    if(m.to===56)n.cast=n.cast.replace('Q','');
    if(m.to===7)n.cast=n.cast.replace('k','');
    if(m.to===0)n.cast=n.cast.replace('q','');
  }
  n.ep=m.dbl?idx((rc(m.from)[0]+rc(m.to)[0])/2,rc(m.from)[1]):null;
  n.turn=opp(s.turn);
  if(s.turn===BLACK)n.full++;
  n.half=(p.t==='P'||cap||m.ep)?0:s.half+1;
  return n;
}

function attacked(s,sq,by){
  const b=s.b,[r,c]=rc(sq),pdir=by===WHITE?-1:1;
  for(const dc of[-1,1]){const rr=r-pdir,cc=c+dc;if(on(rr,cc)){const p=b[idx(rr,cc)];if(p&&p.c===by&&p.t==='P')return true;}}
  for(const[dr,dc]of[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]){const rr=r+dr,cc=c+dc;if(on(rr,cc)){const p=b[idx(rr,cc)];if(p&&p.c===by&&p.t==='N')return true;}}
  for(const[dr,dc,types]of[[-1,-1,'BQ'],[-1,1,'BQ'],[1,-1,'BQ'],[1,1,'BQ'],[-1,0,'RQ'],[1,0,'RQ'],[0,-1,'RQ'],[0,1,'RQ']]){
    let rr=r+dr,cc=c+dc;
    while(on(rr,cc)){const p=b[idx(rr,cc)];if(p){if(p.c===by&&types.includes(p.t))return true;break;}rr+=dr;cc+=dc;}
  }
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;const rr=r+dr,cc=c+dc;if(on(rr,cc)){const p=b[idx(rr,cc)];if(p&&p.c===by&&p.t==='K')return true;}}
  return false;
}

function kingSquare(s,color){return s.b.findIndex(p=>p&&p.c===color&&p.t==='K');}
function inCheck(s,color){const k=kingSquare(s,color);return k>=0&&attacked(s,k,opp(color));}

function posKey(s){
  return s.b.map(p=>p?p.c+p.t:'..').join('')+' '+s.turn+' '+s.cast+' '+(s.ep??'-');
}

function staticEval(s){
  let score=0,bishopsW=0,bishopsB=0,pawnsW=Array(8).fill(0),pawnsB=Array(8).fill(0);
  for(let i=0;i<64;i++){
    const p=s.b[i];if(!p)continue;
    const[r,c]=rc(i);
    if(p.t==='B')p.c===WHITE?bishopsW++:bishopsB++;
    if(p.t==='P')(p.c===WHITE?pawnsW:pawnsB)[c]++;
    const pstIndex=p.c===WHITE?i:(7-r)*8+c;
    const val=VAL[p.t]+(PST[p.t]?.[pstIndex]||0);
    score+=p.c===WHITE?val:-val;
  }
  if(bishopsW>=2)score+=35;if(bishopsB>=2)score-=35;
  for(let f=0;f<8;f++){if(pawnsW[f]>1)score-=14*(pawnsW[f]-1);if(pawnsB[f]>1)score+=14*(pawnsB[f]-1);}
  score+=(pseudoMoves(s,WHITE).length-pseudoMoves(s,BLACK).length)*2;
  if(inCheck(s,BLACK))score+=28;if(inCheck(s,WHITE))score-=28;
  return score;
}

function isNoisy(s,m){return !!(s.b[m.to]||m.ep||m.promo);}
function sameMove(a,b){return a&&b&&a.from===b.from&&a.to===b.to&&a.promo===b.promo&&a.castle===b.castle&&a.ep===b.ep;}
function moveOrderScore(s,m,ttBest){
  if(ttBest&&sameMove(m,ttBest))return 1e9;
  const p=s.b[m.from],cap=s.b[m.to];let score=0;
  if(cap)score+=100000+VAL[cap.t]*10-VAL[p.t];
  if(m.ep)score+=100000+VAL.P*10-VAL.P;
  if(m.promo)score+=80000+VAL[m.promo];
  if(m.castle)score+=6000;
  const n=applyMove(s,m,false);if(inCheck(n,n.turn))score+=30000;
  if(attacked(n,m.to,n.turn)&&p.t!=='K')score-=Math.max(0,VAL[p.t]-(cap?VAL[cap.t]:0))*8;
  return score;
}

// === POLYGLOT OPENING BOOK (Zobrist hash + binary search) ===
let workerBookData=null,workerPolyRands=null;

function initPolyglotRandoms(){
  const R=[],MASK=0xFFFFFFFFFFFFFFFFn,MULT=2685821657736338717n;
  let s=1070372531n;
  for(let i=0;i<781;i++){
    s^=(s>>12n)&MASK;s^=(s<<25n)&MASK;s^=(s>>27n)&MASK;s&=MASK;
    R.push((s*MULT)&MASK);
  }
  return R;
}

function polyHash(st,R){
  // piece indices: bP=0,wP=1,bN=2,wN=3,bB=4,wB=5,bR=6,wR=7,bQ=8,wQ=9,bK=10,wK=11
  const PI={P:{w:1,b:0},N:{w:3,b:2},B:{w:5,b:4},R:{w:7,b:6},Q:{w:9,b:8},K:{w:11,b:10}};
  let h=0n;
  for(let i=0;i<64;i++){
    const p=st.b[i];if(!p)continue;
    const r=Math.floor(i/8),c=i%8;
    const sq=c+8*(7-r); // Polyglot: 0=a1 ... 63=h8
    h^=R[PI[p.t][p.c]*64+sq];
  }
  if(st.cast.includes('K'))h^=R[768];
  if(st.cast.includes('Q'))h^=R[769];
  if(st.cast.includes('k'))h^=R[770];
  if(st.cast.includes('q'))h^=R[771];
  if(st.ep!==null)h^=R[772+(st.ep%8)];
  if(st.turn===BLACK)h^=R[780];
  return h;
}

function polyLookup(hash,data){
  if(!data)return[];
  const v=new DataView(data.buffer),n=Math.floor(data.length/16);
  const FILES='abcdefgh',PROMOS=['','n','b','r','q'];
  let lo=0,hi=n-1;
  while(lo<=hi){
    const mid=(lo+hi)>>1;
    const k=(BigInt(v.getUint32(mid*16,false))<<32n)|BigInt(v.getUint32(mid*16+4,false));
    if(k<hash){lo=mid+1;}else if(k>hash){hi=mid-1;}
    else{
      let start=mid;
      while(start>0){
        const k2=(BigInt(v.getUint32((start-1)*16,false))<<32n)|BigInt(v.getUint32((start-1)*16+4,false));
        if(k2!==hash)break;start--;
      }
      const moves=[];
      for(let j=start;j<n;j++){
        const k2=(BigInt(v.getUint32(j*16,false))<<32n)|BigInt(v.getUint32(j*16+4,false));
        if(k2!==hash)break;
        const mw=v.getUint16(j*16+8,false),w=v.getUint16(j*16+10,false);
        const tf=mw&7,tr=(mw>>3)&7,ff=(mw>>6)&7,fr=(mw>>9)&7,pr=(mw>>12)&7;
        moves.push({uci:FILES[ff]+(fr+1)+FILES[tf]+(tr+1)+(PROMOS[pr]||''),weight:w});
      }
      // Trier par poids décroissant
      moves.sort((a,b)=>b.weight-a.weight);
      return moves;
    }
  }
  return[];
}

let deadline=0,tt=new Map();
function quiesce(s,alpha,beta,ply){
  if(performance.now()>deadline)throw new Error('time');
  let stand=s.turn===WHITE?staticEval(s):-staticEval(s);
  if(stand>=beta)return beta;if(alpha<stand)alpha=stand;
  const moves=legalMoves(s).filter(m=>isNoisy(s,m));
  moves.sort((a,b)=>moveOrderScore(s,b)-moveOrderScore(s,a));
  for(const m of moves){
    const score=-quiesce(applyMove(s,m,false),-beta,-alpha,ply+1);
    if(score>=beta)return beta;if(score>alpha)alpha=score;
  }
  return alpha;
}
function negamax(s,depth,alpha,beta,ply){
  if(performance.now()>deadline)throw new Error('time');
  const origAlpha=alpha,k=posKey(s),ent=tt.get(k);
  if(ent&&ent.depth>=depth){
    if(ent.flag==='exact')return ent.score;
    if(ent.flag==='lower'&&ent.score>alpha)alpha=ent.score;
    if(ent.flag==='upper'&&ent.score<beta)beta=ent.score;
    if(alpha>=beta)return ent.score;
  }
  const moves=legalMoves(s);
  if(!moves.length)return inCheck(s,s.turn)?-MATE+ply:0;
  if(depth<=0)return quiesce(s,alpha,beta,ply);
  moves.sort((a,b)=>moveOrderScore(s,b,ent?.best)-moveOrderScore(s,a,ent?.best));
  let best=null,bestScore=-Infinity;
  for(const m of moves){
    const score=-negamax(applyMove(s,m,false),depth-1,-beta,-alpha,ply+1);
    if(score>bestScore){bestScore=score;best=m;}
    if(score>alpha)alpha=score;
    if(alpha>=beta)break;
  }
  const flag=bestScore<=origAlpha?'upper':bestScore>=beta?'lower':'exact';
  tt.set(k,{depth,score:bestScore,flag,best});
  return bestScore;
}

  tt=new Map();deadline=performance.now()+BOT_TIME_MS;

    let localBest=best,localScore=-Infinity;
    try{
      const rootKey=posKey(s),ent=tt.get(rootKey);
      moves.sort((a,b)=>moveOrderScore(s,b,ent?.best)-moveOrderScore(s,a,ent?.best));
      let alpha=-Infinity,beta=Infinity;
      for(const m of moves){
        const score=-negamax(applyMove(s,m,false),depth-1,-beta,-alpha,1);
        if(score>localScore){localScore=score;localBest=m;}
        if(score>alpha)alpha=score;
      }
      best=localBest;bestScore=localScore;
      if(Math.abs(bestScore)>MATE-1000)break;
    }catch(e){break;}
  }
  return best;
}

const ANALYZE_TIME_MS=700, ANALYZE_DEPTH=6;

// La position courante est-elle encore dans la théorie connue ?
// openingBookMove renvoie un coup si la position est dans le livre, sinon null.
function positionInBook(s,history){
  return openingBookMove(s,history||[])!==null;
}

// Variante principale par parcours de la table de transposition
function extractPV(s,firstMove,maxLen){
  const pv=[]; let cur=s, mv=firstMove, guard=0;
  while(mv&&pv.length<maxLen&&guard++<40){
    pv.push(sqName(mv.from)+sqName(mv.to)+(mv.promo?mv.promo.toLowerCase():''));
    cur=applyMove(cur,mv,false);
    const ent=tt.get(posKey(cur));
    if(!ent||!ent.best)break;
    const lm=legalMoves(cur);
    const nm=lm.find(x=>x.from===ent.best.from&&x.to===ent.best.to&&(x.promo||null)===(ent.best.promo||null));
    if(!nm)break;
    mv=nm;
  }
  return pv;
}

function analyzePosition(s,history){
  const inBook=positionInBook(s,history);
  const moves=legalMoves(s);
  if(!moves.length){
    const mated=inCheck(s,s.turn);
    const evalCp=mated?(s.turn===WHITE?-MATE:MATE):0;
    return {evalCp,pv:[],isBook:inBook,gameOver:true};
  }
  tt=new Map();deadline=performance.now()+ANALYZE_TIME_MS;
  let best=moves[0],bestScore=-Infinity;
  for(let depth=1;depth<=ANALYZE_DEPTH;depth++){
    try{
      const rootKey=posKey(s),ent=tt.get(rootKey);
      moves.sort((a,b)=>moveOrderScore(s,b,ent?.best)-moveOrderScore(s,a,ent?.best));
      let alpha=-Infinity,beta=Infinity,localBest=best,localScore=-Infinity;
      for(const m of moves){
        const sc=-negamax(applyMove(s,m,false),depth-1,-beta,-alpha,1);
        if(sc>localScore){localScore=sc;localBest=m;}
        if(sc>alpha)alpha=sc;
      }
      best=localBest;bestScore=localScore;
      if(Math.abs(bestScore)>MATE-1000)break;
    }catch(e){break;}
  }
  const evalCp=s.turn===WHITE?bestScore:-bestScore;
  const pv=extractPV(s,best,8);
  return {evalCp,pv,isBook:inBook,gameOver:false};
}

function toFrenchSAN(san){ return san.replace(/[NBRQK]/g,c=>SAN_FR[c]); }

// Convertit une variante en UCI (depuis la position courante par défaut) en SAN français
function pvToSan(pvUci, fromState){
  let s=fromState||state;
  const out=[];
  for(const u of pvUci){
    const lm=legalMoves(s);
    const m=lm.find(x=>sqName(x.from)+sqName(x.to)+(x.promo?x.promo.toLowerCase():'')===u);
    if(!m)break;
    out.push(toFrenchSAN(notation(s,m)));
    s=applyMove(s,m,false);
  }
  return out;
}

// Numérote une liste de coups SAN. startState détermine le n° et le camp au trait.
function formatPvLine(sanList, startState){
  const s=startState||state;
  let moveNo=s.full, whiteToMove=(s.turn===WHITE);
  const parts=[];
  for(let i=0;i<sanList.length;i++){
    if(whiteToMove){ parts.push(moveNo+'.'+sanList[i]); }
    else{ if(i===0)parts.push(moveNo+'...'+sanList[i]); else parts.push(sanList[i]); moveNo++; }
    whiteToMove=!whiteToMove;
  }
  return parts.join(' ');
}

// cp est exprimé du point de vue des Blancs (positif = avantage blancs)
function formatEval(cp){
  if(cp>=MATE_THRESHOLD)return '#';
  if(cp<=-MATE_THRESHOLD)return '−#';
  const pawns=cp/100;
  const sign=pawns>0?'+':(pawns<0?'−':'');
  return sign+Math.abs(pawns).toFixed(1).replace('.',',');
}

function evalToWords(cp){
  if(cp>=MATE_THRESHOLD)return 'Mat pour les Blancs';
  if(cp<=-MATE_THRESHOLD)return 'Mat pour les Noirs';
  const a=Math.abs(cp);
  if(a<30)return 'position égale';
  const camp=cp>0?'Blancs':'Noirs';
  if(a<90)return 'léger avantage aux '+camp;
  if(a<250)return 'avantage aux '+camp;
  return 'avantage décisif aux '+camp;
}

// === CHESS LOGIC (duplicated from worker for UI) ===
const rc  = i=>[Math.floor(i/8),i%8];
const idx = (r,c)=>r*8+c;
const on  = (r,c)=>r>=0&&r<8&&c>=0&&c<8;
const opp = c=>c===WHITE?BLACK:WHITE;
function sqName(i){const[r,c]=rc(i);return FILES[c]+(8-r);}
function sqIndex(s){return(8-Number(s[1]))*8+FILES.indexOf(s[0]);}
function clone(s){return{b:s.b.map(p=>p?{...p}:null),turn:s.turn,cast:s.cast,ep:s.ep,half:s.half,full:s.full};}

function fromFEN(fen){
  const[pos,turn,cast,ep,half,full]=fen.split(' '),b=Array(64).fill(null);
  let i=0;
  for(const ch of pos){
    if(ch==='/')continue;
    if(/[1-8]/.test(ch))i+=+ch;
    else b[i++]={c:ch===ch.toUpperCase()?WHITE:BLACK,t:ch.toUpperCase()};
  }
  return{b,turn,cast:cast==='-'?'':cast,ep:ep==='-'?null:sqIndex(ep),half:+half||0,full:+full||1};
}

function pseudoMoves(s,color){
  const moves=[],b=s.b;
  const add=(from,to,x={})=>moves.push({from,to,...x});
  for(let i=0;i<64;i++){
    const p=b[i];if(!p||p.c!==color)continue;
    const[r,c]=rc(i);
    if(p.t==='P'){
      const dir=color===WHITE?-1:1,start=color===WHITE?6:1,prom=color===WHITE?0:7;
      const fr=r+dir;
      if(on(fr,c)&&!b[idx(fr,c)]){
        const to=idx(fr,c);
        if(fr===prom)['Q','R','B','N'].forEach(pr=>add(i,to,{promo:pr}));
        else add(i,to);
        const dr=r+2*dir;
        if(r===start&&!b[idx(dr,c)])add(i,idx(dr,c),{dbl:true});
      }
      for(const dc of[-1,1]){
        const rr=r+dir,cc=c+dc;
        if(!on(rr,cc))continue;
        const to=idx(rr,cc),target=b[to];
        if(target&&target.c!==color){
          if(rr===prom)['Q','R','B','N'].forEach(pr=>add(i,to,{promo:pr}));
          else add(i,to);
        }
        if(s.ep===to)add(i,to,{ep:true});
      }
    } else if(p.t==='N'){
      for(const[dr,dc]of[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]){
        const rr=r+dr,cc=c+dc;
        if(on(rr,cc)&&(!b[idx(rr,cc)]||b[idx(rr,cc)].c!==color))add(i,idx(rr,cc));
      }
    } else if(p.t==='B'||p.t==='R'||p.t==='Q'){
      const dirs=[];
      if(p.t!=='R')dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
      if(p.t!=='B')dirs.push([-1,0],[1,0],[0,-1],[0,1]);
      for(const[dr,dc]of dirs){
        let rr=r+dr,cc=c+dc;
        while(on(rr,cc)){
          const to=idx(rr,cc),q=b[to];
          if(!q)add(i,to);else{if(q.c!==color)add(i,to);break;}
          rr+=dr;cc+=dc;
        }
      }
    } else if(p.t==='K'){
      for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
        if(!dr&&!dc)continue;
        const rr=r+dr,cc=c+dc;
        if(on(rr,cc)&&(!b[idx(rr,cc)]||b[idx(rr,cc)].c!==color))add(i,idx(rr,cc));
      }
      if(!inCheck(s,color)){
        if(color===WHITE&&i===60){
          if(s.cast.includes('K')&&!b[61]&&!b[62]&&!attacked(s,61,BLACK)&&!attacked(s,62,BLACK))add(i,62,{castle:'K'});
          if(s.cast.includes('Q')&&!b[59]&&!b[58]&&!b[57]&&!attacked(s,59,BLACK)&&!attacked(s,58,BLACK))add(i,58,{castle:'Q'});
        }
        if(color===BLACK&&i===4){
          if(s.cast.includes('k')&&!b[5]&&!b[6]&&!attacked(s,5,WHITE)&&!attacked(s,6,WHITE))add(i,6,{castle:'k'});
          if(s.cast.includes('q')&&!b[3]&&!b[2]&&!b[1]&&!attacked(s,3,WHITE)&&!attacked(s,2,WHITE))add(i,2,{castle:'q'});
        }
      }
    }
  }
  return moves;
}

function legalMoves(s,color=s.turn){
  return pseudoMoves(s,color).filter(m=>!inCheck(applyMove(s,m,false),color));
}

function attacked(s,sq,by){
  const b=s.b,[r,c]=rc(sq),pdir=by===WHITE?-1:1;
  for(const dc of[-1,1]){const rr=r-pdir,cc=c+dc;if(on(rr,cc)){const p=b[idx(rr,cc)];if(p&&p.c===by&&p.t==='P')return true;}}
  for(const[dr,dc]of[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]){const rr=r+dr,cc=c+dc;if(on(rr,cc)){const p=b[idx(rr,cc)];if(p&&p.c===by&&p.t==='N')return true;}}
  for(const[dr,dc,types]of[[-1,-1,'BQ'],[-1,1,'BQ'],[1,-1,'BQ'],[1,1,'BQ'],[-1,0,'RQ'],[1,0,'RQ'],[0,-1,'RQ'],[0,1,'RQ']]){
    let rr=r+dr,cc=c+dc;
    while(on(rr,cc)){const p=b[idx(rr,cc)];if(p){if(p.c===by&&types.includes(p.t))return true;break;}rr+=dr;cc+=dc;}
  }
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;const rr=r+dr,cc=c+dc;if(on(rr,cc)){const p=b[idx(rr,cc)];if(p&&p.c===by&&p.t==='K')return true;}}
  return false;
}

function kingSquare(s,color){return s.b.findIndex(p=>p&&p.c===color&&p.t==='K');}
function inCheck(s,color){const k=kingSquare(s,color);return k>=0&&attacked(s,k,opp(color));}

function notation(s,m){
  const p=s.b[m.from];
  if(m.castle)return m.castle.toLowerCase()==='k'?'O-O':'O-O-O';
  const cap=s.b[m.to]||m.ep;
  let out;
  if(p.t==='P'){
    out=cap?FILES[rc(m.from)[1]]:'';
  } else {
    out=p.t;
    // Désambiguïsation SAN : d'autres pièces de même type peuvent-elles aller sur m.to ?
    const others=legalMoves(s,s.turn).filter(x=>x.to===m.to&&x.from!==m.from&&s.b[x.from]&&s.b[x.from].t===p.t);
    if(others.length){
      const[fr,fc]=rc(m.from);
      const sameFile=others.some(x=>rc(x.from)[1]===fc);
      const sameRank=others.some(x=>rc(x.from)[0]===fr);
      if(!sameFile)out+=FILES[fc];           // colonne suffit
      else if(!sameRank)out+=String(8-fr);   // sinon rangée
      else out+=sqName(m.from);              // sinon case complète
    }
  }
  out+=cap?'x':'';out+=sqName(m.to);
  if(m.promo)out+='='+m.promo;
  const n=applyMove(s,m,false),lm=legalMoves(n,n.turn);
  if(inCheck(n,n.turn))out+=lm.length?'+':'#';
  return out;
}

function posKey(s){
  return s.b.map(p=>p?p.c+p.t:'..').join('')+' '+s.turn+' '+s.cast+' '+(s.ep??'-');
}

function applyMove(s,m,real=false){
  const n=clone(s),b=n.b,p=b[m.from],cap=b[m.to];
  b[m.to]=p;b[m.from]=null;
  if(m.ep){const capSq=m.to+(p.c===WHITE?8:-8);b[capSq]=null;}
  if(m.promo)b[m.to]={c:p.c,t:m.promo};
  if(m.castle==='K'){b[61]=b[63];b[63]=null;}
  if(m.castle==='Q'){b[59]=b[56];b[56]=null;}
  if(m.castle==='k'){b[5]=b[7];b[7]=null;}
  if(m.castle==='q'){b[3]=b[0];b[0]=null;}
  if(p.t==='K')n.cast=n.cast.replace(p.c===WHITE?/K|Q/g:/k|q/g,'');
  if(p.t==='R'){
    if(m.from===63)n.cast=n.cast.replace('K','');
    if(m.from===56)n.cast=n.cast.replace('Q','');
    if(m.from===7)n.cast=n.cast.replace('k','');
    if(m.from===0)n.cast=n.cast.replace('q','');
  }
  if(cap&&cap.t==='R'){
    if(m.to===63)n.cast=n.cast.replace('K','');
    if(m.to===56)n.cast=n.cast.replace('Q','');
    if(m.to===7)n.cast=n.cast.replace('k','');
    if(m.to===0)n.cast=n.cast.replace('q','');
  }
  n.ep=m.dbl?idx((rc(m.from)[0]+rc(m.to)[0])/2,rc(m.from)[1]):null;
  n.turn=opp(s.turn);
  if(s.turn===BLACK)n.full++;
  n.half=(p.t==='P'||cap||m.ep)?0:s.half+1;
  if(real){
    const captured=cap||(m.ep?{c:opp(p.c),t:'P'}:null);
    lastMove={from:m.from,to:m.to};
    if(m.castle==='K')lastMove.rook={from:63,to:61};
    if(m.castle==='Q')lastMove.rook={from:56,to:59};
    if(m.castle==='k')lastMove.rook={from:7,to:5};
    if(m.castle==='q')lastMove.rook={from:0,to:3};
    history.push({by:p.c,piece:p.t,from:m.from,to:m.to,captured:captured?captured.t:null,notation:notation(s,m),uci:sqName(m.from)+sqName(m.to)+(m.promo?m.promo.toLowerCase():'')});
    // Track position for threefold repetition
    const k=posKey(n);
    positionCounts.set(k,(positionCounts.get(k)||0)+1);
  }
  return n;
}

// === DRAW DETECTION ===
function isInsufficientMaterial(s){
  const pieces=[];
  for(let i=0;i<64;i++){const p=s.b[i];if(p)pieces.push({i,...p});}
  const nk=pieces.filter(p=>p.t!=='K');
  if(nk.length===0)return true;
  if(nk.length===1&&['B','N'].includes(nk[0].t))return true;
  if(nk.length===2&&nk.every(p=>p.t==='B')){
    const cols=nk.map(p=>{const[r,c]=rc(p.i);return(r+c)%2;});
    if(cols[0]===cols[1])return true;
  }
  return false;
}

function isThreefoldRepetition(){
  return(positionCounts.get(posKey(state))||0)>=3;
}

function isFiftyMoveRule(){
  return state.half>=100;
}

function isDrawPosition(lm){
  if(isInsufficientMaterial(state))return'insufficient';
  if(lm.length===0&&!inCheck(state,state.turn))return'stalemate';
  if(isThreefoldRepetition())return'threefold';
  if(isFiftyMoveRule())return'fifty';
  return false;
}

// === RENDERING ===
function render(){
  legalCache=legalMoves(state);
  boardEl.innerHTML='';
  const ksq=kingSquare(state,state.turn),chk=inCheck(state,state.turn);
  for(let v=0;v<64;v++){
    const i=flipped?63-v:v,[r,c]=rc(i);
    const sq=document.createElement('div');
    sq.className=`square ${(r+c)%2?'dark':'light'}`;
    sq.dataset.i=i;
    if((!flipped&&r===7)||(flipped&&r===0)){sq.classList.add('coord');sq.dataset.coord=sqName(i);}
    if(lastMove&&(i===lastMove.from||i===lastMove.to))sq.classList.add('last');
    if(chk&&i===ksq)sq.classList.add('check');
    const p=state.b[i];
    if(p){
      const el=document.createElement('div');
      el.className='piece';el.dataset.i=i;
      el.innerHTML=pieceSVG(p);
      sq.appendChild(el);
    }
    boardEl.appendChild(sq);
  }
  drawLastMoveArrow();
  markSelection();
  updatePanel();
}

function visualCell(i){const v=flipped?63-i:i;return{row:Math.floor(v/8),col:v%8};}
function drawLastMoveArrow(){
  if(!lastMove)return;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('id','moveArrow');
  svg.setAttribute('viewBox','0 0 8 8');
  svg.setAttribute('preserveAspectRatio','none');
  const arrows=lastMove.rook
    ?[{from:lastMove.from,to:lastMove.to,yOffset:-.09},{from:lastMove.rook.from,to:lastMove.rook.to,yOffset:.09}]
    :[{from:lastMove.from,to:lastMove.to,yOffset:0}];
  const parts=arrows.map(a=>{
    const from=visualCell(a.from),to=visualCell(a.to);
    const sx=from.col+.5,sy=from.row+.5+a.yOffset;
    const tx=to.col+.5,ty=to.row+.5+a.yOffset;
    const dx=tx-sx,dy=ty-sy,len=Math.hypot(dx,dy)||1;
    const ux=dx/len,uy=dy/len,px=-uy,py=ux;
    const startPad=.28,headLen=.24,headWid=.16,tipPad=.30;
    const x1=sx+ux*startPad,y1=sy+uy*startPad;
    const tipX=tx-ux*tipPad,tipY=ty-uy*tipPad;
    const baseX=tipX-ux*headLen,baseY=tipY-uy*headLen;
    const leftX=baseX+px*headWid,leftY=baseY+py*headWid;
    const rightX=baseX-px*headWid,rightY=baseY-py*headWid;
    return `<line class="move-arrow-line" x1="${x1}" y1="${y1}" x2="${baseX}" y2="${baseY}"></line>
<polygon points="${tipX},${tipY} ${leftX},${leftY} ${rightX},${rightY}" fill="rgba(83,107,70,.92)" filter="drop-shadow(0 .035px .045px rgba(0,0,0,.28))"></polygon>`;
  }).join('');
  svg.innerHTML=parts;
  boardEl.appendChild(svg);
}

function pieceName(t){return{P:'PAWN',N:'KNIGHT',B:'BISHOP',R:'ROOK',Q:'QUEEN',K:'KING'}[t]||t;}

function updatePanel(){
  const lm=legalCache.length?legalCache:legalMoves(state);
  const noMoves=lm.length===0,chk=inCheck(state,state.turn),drawReason=isDrawPosition(lm);
  if(resigned){
    // Abandon manuel : état terminal qui doit survivre aux render() suivants.
    gameOver=true;
    statusEl.textContent='Vous abandonnez — BOT gagne';
  } else {
    gameOver=noMoves||!!drawReason;
    if(gameOver){
      if(drawReason){
        const msgs={insufficient:'Draw — insufficient material',stalemate:'Stalemate',threefold:'Draw — threefold repetition',fifty:'Draw — 50-move rule'};
        statusEl.textContent=msgs[drawReason]||'Draw';
        if(!scoredThisGame){scores.draw++;scoredThisGame=true;saveScores();}
      } else if(chk){
        const userWon=state.turn===botColor;
        statusEl.textContent=userWon?'Checkmate — YOU win':'Checkmate — BOT wins';
        if(!scoredThisGame){userWon?scores.you++:scores.bot++;scoredThisGame=true;saveScores();}
      }
    } else if(botBusy||state.turn===botColor){
      statusEl.textContent='Bot thinking...';
    } else {
      statusEl.textContent=chk?'Your move — CHECK':'Your move';
    }
  }
  updateScoreboard();
  updateCaptures();
  movesEl.innerHTML=(()=>{
    let html='';
    for(let i=0;i<history.length;i+=2){
      const wm=history[i],bm=history[i+1];
      const num=Math.floor(i/2)+1;
      let line=`${num}. ${wm.notation}`;
      if(bm)line+=` ${bm.notation}`;
      html+=`<div class="move-entry"><span class="move-main">${line}</span></div>`;
    }
    return html;
  })();
  movesEl.scrollTop=movesEl.scrollHeight;
}

function markSelection(){
  document.querySelectorAll('.square').forEach(s=>s.classList.remove('from','target','capture'));
  if(selected==null)return;
  const fs=document.querySelector(`.square[data-i="${selected}"]`);
  if(fs)fs.classList.add('from');
  for(const m of legalCache.filter(m=>m.from===selected)){
    const sq=document.querySelector(`.square[data-i="${m.to}"]`);
    if(sq)sq.classList.add(state.b[m.to]||m.ep?'capture':'target');
  }
}

// === SCORE & CAPTURES ===
function loadScores(){try{const s=JSON.parse(localStorage.getItem('chessBotScoresV1'))||{};return{you:+s.you||0,bot:+s.bot||0,draw:+s.draw||0};}catch(e){return{you:0,bot:0,draw:0};}}
function saveScores(){localStorage.setItem('chessBotScoresV1',JSON.stringify(scores));}
function updateScoreboard(){scoreboardEl.textContent=`${scores.you} - ${scores.bot} - ${scores.draw}`;}
function updateCaptures(){
  const takenByUser={},takenByBot={};
  for(const h of history){
    if(!h.captured)continue;
    const bag=h.by===userColor?takenByUser:takenByBot;
    bag[h.captured]=(bag[h.captured]||0)+1;
  }
  renderCaptureBag(userCapsEl,takenByUser,opp(userColor));
  renderCaptureBag(botCapsEl,takenByBot,userColor);
}
function renderCaptureBag(el,bag,color){
  const order=['Q','R','B','N','P'];el.innerHTML='';
  let empty=true;
  for(const t of order){
    const n=bag[t]||0;if(!n)continue;empty=false;
    const span=document.createElement('span');span.className='cap-item';
    span.innerHTML=`<span class="cap-piece">${pieceSVG({c:color,t})}</span>${n>1?`<span class="cap-count">x${n}</span>`:''}`;
    el.appendChild(span);
  }
  if(empty)el.innerHTML='';
}

// === PROMOTION DIALOG ===
function showPromoDialog(from,to,choices){
  pendingPromo={from,to,choices};
  promoChoicesEl.innerHTML='';
  for(const m of choices){
    const btn=document.createElement('button');
    btn.innerHTML=pieceSVG({c:userColor,t:m.promo});
    btn.title=pieceName(m.promo);
    btn.onclick=()=>completePromo(m);
    promoChoicesEl.appendChild(btn);
  }
  promoOverlay.classList.remove('hidden');
}

function completePromo(m){
  promoOverlay.classList.add('hidden');
  pendingPromo=null;
  state=applyMove(state,m,true);
  selected=null;
  render();
  requestAnalysis();
  if(!gameOver)setTimeout(()=>triggerBot(),80);
}

// === BOT ===
function triggerBot(){
  const lm=legalMoves(state);
  if(botBusy||state.turn!==botColor||lm.length===0||isDrawPosition(lm))return;
  botBusy=true;
  render();
  worker.postMessage({state,history});
}

// === MOVE EXECUTION ===
function tryMove(from,to){
  if(mode==='train') return drillTryMove(from,to);
  if(state.turn!==userColor||botBusy||gameOver)return false;
  const choices=legalCache.filter(m=>m.from===from&&m.to===to);
  if(!choices.length)return false;
  // Promotion?
  if(choices.some(m=>m.promo)){
    showPromoDialog(from,to,choices.filter(m=>m.promo));
    return true;
  }
  const m=choices[0];
  state=applyMove(state,m,true);
  selected=null;
  render();
  requestAnalysis();
  if(!gameOver)setTimeout(()=>triggerBot(),80);
  return true;
}

function squareFromPoint(x,y){
  const el=document.elementFromPoint(x,y)?.closest('.square');
  return el?Number(el.dataset.i):null;
}

// === INTERACTION ===
boardEl.addEventListener('pointerdown',e=>{
  if(state.turn!==userColor||botBusy||gameOver)return;
  const piece=e.target.closest('.piece');if(!piece)return;
  const i=Number(piece.dataset.i),p=state.b[i];
  if(!p||p.c!==userColor)return;
  selected=i;markSelection();
  dragging=piece.cloneNode(true);
  dragging.classList.add('dragging');
  dragging.source=piece;
  document.body.appendChild(dragging);
  dragging.style.left=e.clientX+'px';
  dragging.style.top=e.clientY+'px';
  piece.style.opacity='.22';
  boardEl.setPointerCapture(e.pointerId);
});
boardEl.addEventListener('pointermove',e=>{
  if(!dragging)return;
  dragging.style.left=e.clientX+'px';
  dragging.style.top=e.clientY+'px';
});
boardEl.addEventListener('pointerup',e=>{
  if(!dragging)return;
  const from=selected,to=squareFromPoint(e.clientX,e.clientY);
  dragging.source.style.opacity='';
  dragging.remove();dragging=null;
  if(to==null||!tryMove(from,to)){selected=null;render();}
});
boardEl.addEventListener('click',e=>{
  if(dragging||state.turn!==userColor||botBusy||gameOver)return;
  const sq=e.target.closest('.square');if(!sq)return;
  const i=Number(sq.dataset.i),p=state.b[i];
  if(selected!=null&&tryMove(selected,i))return;
  if(p&&p.c===userColor){selected=i;markSelection();}
  else{selected=null;markSelection();}
});

// === GAME MANAGEMENT ===
function startNewGame(flipColors=true){
  if(flipColors){userColor=opp(userColor);botColor=opp(botColor);}
  flipped=userColor===BLACK;
  state=fromFEN(START);
  selected=null;lastMove=null;history=[];
  botBusy=false;gameOver=false;scoredThisGame=false;resigned=false;
  pendingPromo=null;
  positionCounts=new Map();
  promoOverlay.classList.add('hidden');
  legalCache=[];
  render();
  requestAnalysis();
  if(state.turn===botColor)setTimeout(()=>triggerBot(),160);
}

// === POLYGLOT BOOK LOADING ===
const bookStatusEl=document.getElementById('bookStatus');
const bookInputEl=document.getElementById('bookFileInput');

function updateBookStatus(count){
  if(count>0){
    bookStatusEl.textContent=`Livre : ${(count/1000).toFixed(0)}k positions`;
    bookStatusEl.className='book-status loaded';
  } else {
    bookStatusEl.textContent='Pas de livre — charger .bin';
    bookStatusEl.className='book-status';
  }
}

function applyBookData(bytes,name){
  bookData=bytes;
  // Persister en localStorage (base64)
  try{
    const b64=btoa(String.fromCharCode(...bytes));
    localStorage.setItem('polyBookB64',b64);
    localStorage.setItem('polyBookName',name);
  }catch(e){/* quota dépassé, pas grave */}
  sendBookToWorker();
}

function loadBookFromStorage(){
  try{
    const b64=localStorage.getItem('polyBookB64');
    if(!b64)return false;
    const bin=atob(b64);
    const bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    bookData=bytes;
    const name=localStorage.getItem('polyBookName')||'livre';
    updateBookStatus(Math.floor(bytes.length/16));
    console.log(`Livre chargé depuis localStorage : ${name}`);
    return true;
  }catch(e){return false;}
}

bookStatusEl.addEventListener('click',()=>bookInputEl.click());
bookInputEl.addEventListener('change',function(){
  const file=this.files[0];if(!file)return;
  bookStatusEl.textContent='Chargement…';
  const reader=new FileReader();
  reader.onload=function(ev){
    const bytes=new Uint8Array(ev.target.result);
    if(bytes.length===0){
      bookStatusEl.textContent='Fichier vide — utilisez le fichier original (non la copie du dossier chess)';
      bookStatusEl.className='book-status error';return;
    }
    if(bytes.length%16!==0){
      bookStatusEl.textContent='Format invalide (taille non multiple de 16)';
      bookStatusEl.className='book-status error';return;
    }
    applyBookData(bytes,file.name);
  };
  reader.readAsArrayBuffer(file);
});

// Charger le livre depuis localStorage au démarrage, sinon Performance.bin par défaut
if(!loadBookFromStorage()){
  bookStatusEl.textContent='Chargement du livre…';
  fetch('Performance.bin')
    .then(r=>r.ok?r.arrayBuffer():Promise.reject('HTTP '+r.status))
    .then(buf=>{
      const bytes=new Uint8Array(buf);
      if(bytes.length>0&&bytes.length%16===0){
        applyBookData(bytes,'Performance.bin');
      } else {
        updateBookStatus(0);
      }
    })
    .catch(()=>updateBookStatus(0));
}

resetScoresEl.onclick=()=>{
  if(confirm('Effacer tous les scores ?')){
    scores={you:0,bot:0,draw:0};saveScores();updateScoreboard();
  }
};
document.getElementById('newGame').onclick=()=>{
  if(confirm('Nouvelle partie ?'))startNewGame(true);
};
document.getElementById('resign').onclick=()=>{
  if(gameOver||resigned)return;
  if(confirm('Abandonner la partie ?')){
    resigned=true;
    if(!scoredThisGame){scores.bot++;scoredThisGame=true;saveScores();}
    render(); // render() -> updatePanel() applique l'état d'abandon de façon durable
  }
};

// Dismiss promo overlay on escape
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&pendingPromo){
    promoOverlay.classList.add('hidden');
    pendingPromo=null;
    selected=null;
    render();
  }
});

// === CÂBLAGE UI TUTEUR ===
(function wireTutor(){
  const toggle=document.getElementById('tutorToggle');
  const settingsBtn=document.getElementById('tutorSettingsBtn');
  const settings=document.getElementById('tutorSettings');
  const keyInput=document.getElementById('tutorKeyInput');
  const modelInput=document.getElementById('tutorModelInput');
  const saveBtn=document.getElementById('tutorSaveBtn');
  const askBtn=document.getElementById('tutorAskBtn');

  // Pré-remplir les réglages depuis localStorage
  const s=getTutorSettings();
  keyInput.value=s.apiKey; modelInput.value=s.model;
  function refreshAskState(){ askBtn.disabled=!getTutorSettings().apiKey; }
  refreshAskState();

  toggle.addEventListener('change',()=>{
    tutorEnabled=toggle.checked;
    renderTutorPanel();
    if(tutorEnabled)requestAnalysis();
  });
  settingsBtn.addEventListener('click',()=>settings.classList.toggle('hidden'));
  saveBtn.addEventListener('click',()=>{
    setTutorSetting('tutorApiKey',keyInput.value.trim());
    setTutorSetting('tutorModel',modelInput.value);
    refreshAskState();
    settings.classList.add('hidden');
  });
  askBtn.addEventListener('click',askLLM);
  const testBtn=document.getElementById('tutorTestBtn');
  const testResult=document.getElementById('tutorTestResult');
  testBtn.addEventListener('click',async()=>{
    setTutorSetting('tutorApiKey',keyInput.value.trim());
    setTutorSetting('tutorModel',modelInput.value);
    refreshAskState();
    testResult.textContent='Test…';
    const {apiKey,model}=getTutorSettings();
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'content-type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model,max_tokens:8,messages:[{role:'user',content:'ping'}]})
      });
      testResult.textContent=res.ok?'✓ Connexion OK':'✗ Erreur '+res.status;
    }catch(e){ testResult.textContent='✗ '+e.message; }
  });
})();
